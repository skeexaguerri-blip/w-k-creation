<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique des Paiements — W&K Creation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --or: #C9A84C; --or-light: #E8C96A; --or-dark: #A07C2E;
      --noir: #0D0D0D; --noir2: #141414; --noir3: #1E1E1E;
      --blanc: #F5F0E8; --gris: #888; --gris2: #555;
      --rouge: #E05252; --vert: #4CAF7D;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--noir); color: var(--blanc); font-family: 'DM Sans', sans-serif; padding: 40px 20px; }
    
    .container { max-width: 900px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 50px; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 12px; }
    .header p { color: var(--gris); font-size: 0.95rem; }
    
    .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 900; color: var(--or); letter-spacing: 2px; text-decoration: none; display: inline-block; margin-bottom: 30px; }
    
    .form-search { background: var(--noir2); border: 1px solid rgba(201,168,76,0.2); padding: 24px; margin-bottom: 30px; border-radius: 4px; display: flex; gap: 12px; }
    .form-search input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--blanc); padding: 12px 16px; font-family: 'DM Sans', sans-serif; }
    .form-search input:focus { outline: none; border-color: var(--or); }
    .form-search button { background: var(--or); color: var(--noir); border: none; padding: 12px 30px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .form-search button:hover { background: var(--or-light); }
    
    .payment-card { background: var(--noir2); border: 1px solid rgba(201,168,76,0.2); padding: 24px; margin-bottom: 16px; border-radius: 4px; }
    .payment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .payment-plan { font-size: 1.1rem; font-weight: 600; }
    .payment-status { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .status-actif { background: rgba(76,175,125,0.2); color: var(--vert); }
    .status-pending { background: rgba(201,168,76,0.2); color: var(--or); }
    .status-failed { background: rgba(224,82,82,0.2); color: var(--rouge); }
    
    .payment-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .info-item { }
    .info-label { color: var(--gris); font-size: 0.85rem; margin-bottom: 4px; }
    .info-value { color: var(--blanc); font-weight: 600; }
    .info-value.amount { color: var(--or); font-size: 1.2rem; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gris); }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    
    .loading { text-align: center; color: var(--gris); padding: 40px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--blanc); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-box { background: rgba(224,82,82,0.12); border: 1px solid rgba(224,82,82,0.4); color: var(--rouge); padding: 16px; border-radius: 4px; margin-bottom: 20px; }
    
    .btn-back { display: inline-block; margin-bottom: 20px; color: var(--or); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .btn-back:hover { color: var(--or-light); }
    
    @media (max-width: 768px) {
      .form-search { flex-direction: column; }
      .payment-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .payment-info { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">W&K <span style="color:var(--blanc)">Creation</span></a>
    <a href="/" class="btn-back">← Retour à l'accueil</a>
    
    <div class="header">
      <h1>Historique des Paiements</h1>
      <p>Consultez vos transactions et l'état de votre compte</p>
    </div>
    
    <div class="form-search">
      <input type="email" id="emailInput" placeholder="Entrez votre email..." autocomplete="email">
      <button onclick="searchPayment()">Rechercher</button>
    </div>
    
    <div id="resultContainer">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>Entrez votre email pour consulter vos paiements</p>
      </div>
    </div>
  </div>

  <script>
    // SUPABASE
    const { createClient } = supabase;
    const db = createClient(
      'https://upaewkcazpvidzlwfttj.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwYWV3a2NhenB2aWR6bHdmdHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzM3NTUsImV4cCI6MjA5NjM0OTc1NX0.7OfIH8gLg3sv4t6INFSap76_KN2Xixm39fDjAlh7X74'
    );

    // Format date en français
    function formatDate(isoDate) {
      if (!isoDate) return '—';
      const date = new Date(isoDate);
      return date.toLocaleDateString('fr-CI', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Format montant
    function formatAmount(amount) {
      if (!amount) return '—';
      return amount.toLocaleString('fr-CI') + ' FCFA';
    }

    // Obtenir badge statut
    function getStatusBadge(status) {
      const statusMap = {
        'actif': 'status-actif',
        'en_attente': 'status-pending',
        'paiement_échoué': 'status-failed'
      };
      const class_name = statusMap[status] || 'status-pending';
      const labels = {
        'actif': '✓ Actif',
        'en_attente': '⏱️ En attente',
        'paiement_échoué': '❌ Échoué'
      };
      return `<span class="payment-status ${class_name}">${labels[status] || status}</span>`;
    }

    // Rechercher paiement
    async function searchPayment() {
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      
      if (!email) {
        alert('Veuillez entrer une adresse email');
        return;
      }

      const container = document.getElementById('resultContainer');
      container.innerHTML = '<div class="loading"><span class="spinner"></span></div>';

      try {
        const { data, error } = await db
          .from('clients')
          .select('prenom, nom, email, plan, statut, transaction_id, amount_paid, payment_date, payment_status')
          .eq('email', email)
          .single();

        if (error) {
          container.innerHTML = `
            <div class="error-box">
              ❌ Aucun compte trouvé avec l'email : <strong>${email}</strong>
            </div>
            <div class="empty-state">
              <p>Vérifiez votre adresse email et réessayez</p>
            </div>
          `;
          return;
        }

        // Afficher les paiements
        let html = '';
        
        if (data.transaction_id) {
          html += `
            <div class="payment-card">
              <div class="payment-header">
                <span class="payment-plan">${data.plan.charAt(0).toUpperCase() + data.plan.slice(1)}</span>
                ${getStatusBadge(data.statut)}
              </div>
              <div class="payment-info">
                <div class="info-item">
                  <div class="info-label">Montant</div>
                  <div class="info-value amount">${formatAmount(data.amount_paid)}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Date de paiement</div>
                  <div class="info-value">${formatDate(data.payment_date)}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">ID Transaction</div>
                  <div class="info-value" style="font-size:0.85rem">${data.transaction_id}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Statut Paiement</div>
                  <div class="info-value">${data.payment_status || 'confirmed'}</div>
                </div>
              </div>
            </div>
          `;
        } else {
          html += `
            <div class="payment-card">
              <div class="payment-header">
                <span class="payment-plan">${data.plan.charAt(0).toUpperCase() + data.plan.slice(1)}</span>
                ${getStatusBadge(data.statut)}
              </div>
              <div class="payment-info">
                <div class="info-item">
                  <div class="info-label">Statut</div>
                  <div class="info-value">Inscription en attente de paiement</div>
                </div>
              </div>
            </div>
          `;
        }

        // Afficher infos client
        html += `
          <div style="background: var(--noir3); border: 1px solid rgba(201,168,76,0.1); padding: 20px; margin-top: 20px; border-radius: 4px;">
            <h3 style="color: var(--or); margin-bottom: 12px; font-family: 'Playfair Display', serif;">📋 Informations du compte</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; color: var(--gris); font-size: 0.9rem;">
              <div><strong style="color: var(--blanc)">Nom :</strong> ${data.prenom} ${data.nom}</div>
              <div><strong style="color: var(--blanc)">Email :</strong> ${data.email}</div>
              <div><strong style="color: var(--blanc)">Plan :</strong> ${data.plan}</div>
              <div><strong style="color: var(--blanc)">Statut :</strong> ${data.statut}</div>
            </div>
          </div>
        `;

        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `
          <div class="error-box">
            ❌ Erreur : ${err.message}
          </div>
        `;
      }
    }

    // Permettre Enter dans input
    document.getElementById('emailInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') searchPayment();
    });
  </script>
</body>
</html>
